proxy_cache_path /tmp/nginx_img_cache
    levels=1:2
    keys_zone=img_cache:8m
    max_size=256m
    inactive=365d
    use_temp_path=off;

server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20M;

    # ── Static assets: long-lived browser cache ─────────────────
    location ~* \.(js|css|woff2?|ttf|eot|svg|jpg|jpeg|png|webp|ico)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Image proxy: nginx caches images from backend ───────────
    # Each image is fetched from the backend once, then served by
    # nginx forever — eliminating 20-30 simultaneous DB hits on
    # every page load.
    location /api/news/image/ {
        proxy_pass https://thecloudmind-api.fly.dev/news/image/;
        proxy_set_header Host thecloudmind-api.fly.dev;
        proxy_ssl_server_name on;

        proxy_cache          img_cache;
        proxy_cache_valid    200 365d;
        proxy_cache_valid    404 10m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503;
        proxy_cache_lock     on;
        proxy_ignore_headers Cache-Control Expires Set-Cookie;

        add_header X-Cache-Status $upstream_cache_status;
        add_header Cache-Control "public, max-age=31536000, immutable";

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    30s;
    }

    # ── All other /api/* → backend ───────────────────────────────
    location /api/ {
        proxy_pass https://thecloudmind-api.fly.dev/;
        proxy_set_header Host thecloudmind-api.fly.dev;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_connect_timeout 60s;
        proxy_send_timeout    300s;
        proxy_read_timeout    300s;
    }

    # ── React SPA fallback ───────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }
}
